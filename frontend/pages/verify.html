<!DOCTYPE html>
<html>
<head>
  <title>Verify Product</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="nav">
    <div class="brand">Customer Verification</div>
    <div><a href="../index.html">Home</a><a href="login.html">Login</a></div>
  </nav>

  <div class="card">
    <h2>Verify Product Authenticity</h2>
    <p>Enter Product ID or scan QR code.</p>

    <input id="productId" placeholder="Product ID">

    <button onclick="verifyProduct()">Verify Product</button>
    <button onclick="startScanner()">📷 Scan QR Code</button>
    <button onclick="stopScanner()">Stop Scanner</button>

    <div id="reader" style="width:300px; margin-top:20px;"></div>
    <div id="result"></div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="../js/app.js"></script>

  <script>
    let html5QrCode;

    function startScanner() {
      html5QrCode = new Html5Qrcode("reader");

      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        (decodedText) => {
          let productIdValue = decodedText;

          try {
            const url = new URL(decodedText);
            productIdValue = url.searchParams.get("id") || decodedText;
          } catch (e) {}

          document.getElementById("productId").value = productIdValue;
          stopScanner();
          verifyProduct();
        }
      ).catch(err => {
        alert("Camera error: " + err);
      });
    }

    function stopScanner() {
      if (html5QrCode) {
        html5QrCode.stop().catch(() => {});
      }
    }

    const pid = new URLSearchParams(location.search).get("id");
    if (pid) {
      document.getElementById("productId").value = pid;
    }
  </script>
</body>
</html>
